name: Deploy to Development
on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: dev-{sha})"
        required: false
        type: string
        default: ""
      force-deploy:
        description: "Force deployment even if no changes"
        required: false
        type: boolean
        default: false

jobs:
  deploy-dev:
    name: Deploy to Development
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      required_env_vars: GCP_SA_KEY,GCP_PROJECT_ID,TWITCH_CLIENT_ID,ALLOWED_ORIGINS,DB_SERVICE_URL,REDIS_URL,CACHE_TTL,TWITCH_LISTENER_URL,TWITCH_LISTENER_API_KEY,DISCORD_NOTIF_URL
      docker-image-name: notification-handler-api-dev
      docker-tag: ${{ github.event.inputs.image-tag || format('dev-{0}', github.sha) }}
      artifact-registry-repository: "notification-handler-docker-dev"
      environment: development
      cloud-run-service-name: notification-handler-dev
    secrets:
      GCP_SA_KEY: ${{ secrets.DEV_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.DEV_GCP_PROJECT_ID }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS_DEV }}
      DB_SERVICE_URL: ${{ secrets.DEV_DB_SERVICE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      CACHE_TTL: ${{ secrets.CACHE_TTL }}
      TWITCH_LISTENER_URL: ${{ secrets.DEV_TWITCH_LISTENER_URL }}
      TWITCH_LISTENER_API_KEY: ${{ secrets.TWITCH_LISTENER_API_KEY }}
      DISCORD_NOTIF_URL: ${{ secrets.DEV_DISCORD_NOTIF_URL }}
